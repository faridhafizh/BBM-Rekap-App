<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rekap BBM Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Navbar -->
    <nav class="app-navbar">
      <div class="container-fluid px-3 px-md-4">
        <div class="d-flex align-items-center gap-2">
          <div class="app-logo">
            <i class="bi bi-fuel-pump-fill"></i>
          </div>
          <div>
            <div class="app-title">BBM Connect</div>
            <div class="app-subtitle">Sistem Rekapitulasi Data</div>
          </div>
        </div>
      </div>
    </nav>

    <div class="main-wrapper">
      <div class="container py-4">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">

            <!-- Card: Pilih Bulan -->
            <div class="app-card mb-4">
              <div class="app-card-header">
                <i class="bi bi-calendar3"></i>
                <span>Periode Rekap</span>
              </div>
              <div class="app-card-body">
                <label for="monthSelect" class="form-label fw-semibold">Pilih Bulan (Sheet)</label>
                <div class="select-wrapper">
                  <select id="monthSelect" class="form-select app-select">
                    <option value="">— Memuat data sheet... —</option>
                  </select>
                  <i class="bi bi-chevron-down select-chevron"></i>
                </div>
              </div>
            </div>

            <!-- Card: Form Input Rekap -->
            <div class="app-card mb-4" id="mainFormCard" style="display: none">
              <div class="app-card-header">
                <i class="bi bi-pencil-square"></i>
                <span>Form Input Rekap</span>
              </div>
              <div class="app-card-body">

                <!-- Search ID -->
                <label for="inputId" class="form-label fw-semibold">ID Data</label>
                <div class="input-group mb-3 app-input-group">
                  <span class="input-group-text app-input-prefix">
                    <i class="bi bi-hash"></i>
                  </span>
                  <input type="text" id="inputId" class="form-control app-input" placeholder="Masukkan ID dari sheet" />
                  <button id="btnSearch" class="btn btn-search-custom">
                    <i class="bi bi-search me-1"></i>Cari
                  </button>
                </div>

                <!-- Status pesan cari -->
                <div id="saveMessage" class="app-message mb-3" style="display:none"></div>

                <!-- Tipe Pengecekan -->
                <label for="menuType" class="form-label fw-semibold">Tipe Pengecekan</label>
                <div class="select-wrapper mb-3">
                  <select id="menuType" class="form-select app-select">
                    <option value="">— Pilih Tipe Pengecekan —</option>
                    <option value="input">Menu Input (Cek Struk)</option>
                    <option value="unconditional">Menu Unconditional (Cek Approval)</option>
                  </select>
                  <i class="bi bi-chevron-down select-chevron"></i>
                </div>

                <!-- Section: Menu Input -->
                <div id="inputSection" class="section-box" style="display: none">
                  <div class="section-box-label">
                    <i class="bi bi-receipt"></i> Detail Struk
                  </div>
                  <p class="help-note">Isi hanya jika ada ketidaksesuaian. Kosongkan jika data sudah benar.</p>
                  <div class="mb-3">
                    <label for="tanggalRev" class="form-label fw-semibold small">Tanggal Benar</label>
                    <div class="input-group app-input-group">
                      <span class="input-group-text app-input-prefix"><i class="bi bi-calendar-event"></i></span>
                      <input type="text" id="tanggalRev" class="form-control app-input" placeholder="Contoh: 17 April 2026" />
                    </div>
                  </div>
                  <div class="mb-3">
                    <label for="kmRev" class="form-label fw-semibold small">KM Benar</label>
                    <div class="input-group app-input-group">
                      <span class="input-group-text app-input-prefix"><i class="bi bi-speedometer2"></i></span>
                      <input type="text" id="kmRev" class="form-control app-input" placeholder="Contoh: 34550" />
                    </div>
                  </div>
                  <div class="mb-3">
                    <label for="hargaRev" class="form-label fw-semibold small">Harga Benar</label>
                    <div class="input-group app-input-group">
                      <span class="input-group-text app-input-prefix"><i class="bi bi-cash-coin"></i></span>
                      <input type="text" id="hargaRev" class="form-control app-input" placeholder="Contoh: 65000" />
                    </div>
                  </div>
                  <div class="mb-1">
                    <label for="keteranganInput" class="form-label fw-semibold small">Keterangan <span class="text-muted fw-normal">(Opsional)</span></label>
                    <div class="input-group app-input-group">
                      <span class="input-group-text app-input-prefix"><i class="bi bi-chat-left-text"></i></span>
                      <input type="text" id="keteranganInput" class="form-control app-input" placeholder="Contoh: unverified, done, dll." />
                    </div>
                  </div>
                </div>

                <!-- Section: Menu Unconditional -->
                <div id="unconditionalSection" class="section-box" style="display: none">
                  <div class="section-box-label">
                    <i class="bi bi-check2-circle"></i> Status Approval
                  </div>
                  <label for="statusApprov" class="form-label fw-semibold small">Status Saat Ini</label>
                  <div class="select-wrapper">
                    <select id="statusApprov" class="form-select app-select">
                      <option value="">— Pilih Status —</option>
                      <option value="Butuh approved 2">Baru Approved 1 → Butuh approved 2</option>
                      <option value="Butuh approved 3">Baru Approved 2 → Butuh approved 3</option>
                      <option value="Butuh di input">Disetujui GM → Butuh di input</option>
                    </select>
                    <i class="bi bi-chevron-down select-chevron"></i>
                  </div>
                </div>

                <button id="btnSave" class="btn btn-save-custom w-100 mt-3" disabled>
                  <i class="bi bi-floppy2-fill me-2"></i>Simpan Rekap
                </button>

              </div>
            </div>

            <!-- Card: Generate Pesan -->
            <div class="app-card mb-4" id="generateCard" style="display: none">
              <div class="app-card-header">
                <i class="bi bi-send-fill"></i>
                <span>Generate Pesan Laporan</span>
              </div>
              <div class="app-card-body">

                <!-- Template Toggle -->
                <button id="btnToggleTemplate" class="btn btn-template-toggle w-100 mb-3">
                  <i class="bi bi-gear me-2"></i>Edit Template Pesan
                  <i class="bi bi-chevron-down ms-auto toggle-icon"></i>
                </button>

                <div id="templateSection" class="section-box mb-3" style="display: none">
                  <div class="section-box-label">
                    <i class="bi bi-braces"></i> Placeholder tersedia
                  </div>
                  <div class="placeholder-chips mb-3">
                    <span class="chip">{id}</span>
                    <span class="chip">{tanggal}</span>
                    <span class="chip">{km}</span>
                    <span class="chip">{harga}</span>
                    <span class="chip">{status}</span>
                  </div>
                  <div class="mb-3">
                    <label for="templateInput" class="form-label fw-semibold small">Template Menu Input</label>
                    <input type="text" id="templateInput" class="form-control app-input" />
                  </div>
                  <div class="mb-3">
                    <label for="templateUnconditional" class="form-label fw-semibold small">Template Menu Unconditional</label>
                    <input type="text" id="templateUnconditional" class="form-control app-input" />
                  </div>
                  <div class="d-flex gap-2">
                    <button id="btnSaveTemplate" class="btn btn-save-custom flex-grow-1">
                      <i class="bi bi-floppy2 me-1"></i>Simpan
                    </button>
                    <button id="btnResetTemplate" class="btn btn-outline-danger">
                      <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                    </button>
                  </div>
                  <div id="templateMessage" class="app-message mt-2" style="display:none"></div>
                </div>

                <button id="btnGenerate" class="btn btn-generate-custom w-100 mb-3">
                  <i class="bi bi-lightning-charge-fill me-2"></i>Generate Pesan Rekap
                </button>

                <div class="result-wrapper" id="resultWrapper" style="display:none">
                  <div class="result-label">
                    <i class="bi bi-chat-quote"></i> Hasil Rekap
                  </div>
                  <textarea id="resultText" rows="8" readonly class="form-control result-textarea"></textarea>
                  <button id="btnCopy" class="btn btn-copy-custom w-100 mt-2" style="display:none">
                    <i class="bi bi-clipboard2-check me-2"></i>Copy ke Clipboard
                  </button>
                </div>

              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="loader-overlay" style="display:none">
      <div class="loader-box">
        <div class="loader-spinner"></div>
        <div class="loader-text">Memproses...</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>

    <!-- Patch: show resultWrapper when textarea has content -->
    <script>
      const _orig = document.getElementById('resultText');
      const _wrapper = document.getElementById('resultWrapper');
      const _observer = new MutationObserver(() => {
        _wrapper.style.display = _orig.value ? 'block' : 'none';
      });
      document.getElementById('btnGenerate').addEventListener('click', () => {
        setTimeout(() => {
          _wrapper.style.display = _orig.value ? 'block' : 'none';
        }, 2000);
      });
    </script>
  </body>
</html>
